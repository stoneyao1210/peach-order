<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单管理 — 阳山水蜜桃</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; background:#f5f0eb; color:#333; padding:16px; }
.header { background: linear-gradient(135deg,#ff8c69,#ff6b4a); color:#fff; padding:20px; border-radius:14px; margin-bottom:16px; text-align:center; }
.header h1 { font-size:22px; }
.header p { font-size:13px; opacity:0.85; margin-top:4px; }
.stats { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.stat-card { flex:1; min-width:100px; background:#fff; padding:14px; border-radius:10px; text-align:center; box-shadow:0 1px 6px rgba(0,0,0,0.05); }
.stat-card .num { font-size:26px; font-weight:700; color:#ff6b4a; }
.stat-card .label { font-size:12px; color:#999; margin-top:2px; }
.actions { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.btn { padding:10px 18px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-block; }
.btn-primary { background:#ff6b4a; color:#fff; }
.btn-success { background:#27ae60; color:#fff; }
.btn-outline { background:#fff; color:#ff6b4a; border:2px solid #ff6b4a; }
.btn:hover { opacity:0.85; }
table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.05); font-size:12px; }
th { background:#ff6b4a; color:#fff; padding:10px 6px; text-align:left; white-space:nowrap; }
td { padding:9px 6px; border-bottom:1px solid #f0e0d5; }
tr:hover { background:#fff8f4; }
.loading { text-align:center; padding:40px; color:#999; }
.empty { text-align:center; padding:60px; color:#bfa99a; font-size:16px; }
.total-row { background:#fff3ed; font-weight:700; }
@media (max-width:600px) {
  .stat-card { min-width:70px; padding:10px; }
  .stat-card .num { font-size:20px; }
  th, td { font-size:11px; padding:6px 3px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🍑 阳山水蜜桃 · 订单管理</h1>
  <p id="updateTime"></p>
</div>

<div class="stats">
  <div class="stat-card"><div class="num" id="statOrders">0</div><div class="label">订单总数</div></div>
  <div class="stat-card"><div class="num" id="statBoxes">0</div><div class="label">总箱数</div></div>
  <div class="stat-card"><div class="num" id="statRevenue">¥0</div><div class="label">总金额</div></div>
  <div class="stat-card"><div class="num" id="statShipping">¥0</div><div class="label">总邮费</div></div>
</div>

<div class="actions">
  <button class="btn btn-primary" onclick="loadOrders()">🔄 刷新</button>
  <a class="btn btn-success" href="/api/export" target="_blank">📥 导出Excel</a>
  <button class="btn btn-outline" onclick="window.open('/')">🔗 打开下单页</button>
</div>

<div id="tableContainer">
  <div class="loading">加载中...</div>
</div>

<script>
async function loadOrders() {
  document.getElementById('updateTime').textContent = '更新中...';
  try {
    const resp = await fetch('/api/orders');
    if (!resp.ok) throw new Error('请求失败');
    const orders = await resp.json();

    if (!orders || orders.length === 0) {
      document.getElementById('tableContainer').innerHTML = '<div class="empty">🍑 还没有订单，快把下单链接分享给客户吧！</div>';
      ['statOrders','statBoxes','statRevenue','statShipping'].forEach(id => {
        document.getElementById(id).textContent = id === 'statRevenue' || id === 'statShipping' ? '¥0' : '0';
      });
      document.getElementById('updateTime').textContent = '暂无数据';
      return;
    }

    const totalBoxes = orders.reduce((s, o) => s + o.quantity, 0);
    const totalRev = orders.reduce((s, o) => s + o.total, 0);
    const totalPeach = orders.reduce((s, o) => s + o.peach_total, 0);
    const totalShip = orders.reduce((s, o) => s + o.shipping, 0);

    document.getElementById('statOrders').textContent = orders.length;
    document.getElementById('statBoxes').textContent = totalBoxes;
    document.getElementById('statRevenue').textContent = '¥' + totalRev.toLocaleString();
    document.getElementById('statShipping').textContent = '¥' + totalShip.toLocaleString();

    let html = '<table><thead><tr>';
    ['编号','时间','规格','数量','桃子¥','省份','邮费','单数','总价','收件人','手机','地址'].forEach(h => {
      html += '<th>' + h + '</th>';
    });
    html += '</tr></thead><tbody>';

    orders.forEach(o => {
      html += `<tr>
        <td>${o.id}</td>
        <td>${o.created_at}</td>
        <td>${o.spec}</td>
        <td>${o.quantity}</td>
        <td>¥${o.peach_total}</td>
        <td>${o.province}</td>
        <td>¥${o.shipping}</td>
        <td>${o.packages}</td>
        <td style="color:#ff6b4a;font-weight:700;">¥${o.total}</td>
        <td>${o.customer_name}</td>
        <td>${o.customer_phone}</td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${o.address}">${o.address}</td>
      </tr>`;
    });

    html += `<tr class="total-row">
      <td colspan="3"><b>合计 ${orders.length}单</b></td>
      <td><b>${totalBoxes}</b></td>
      <td><b>¥${totalPeach.toLocaleString()}</b></td>
      <td></td>
      <td><b>¥${totalShip.toLocaleString()}</b></td>
      <td></td>
      <td><b>¥${totalRev.toLocaleString()}</b></td>
      <td colspan="3"></td>
    </tr>`;
    html += '</tbody></table>';
    document.getElementById('tableContainer').innerHTML = html;

    document.getElementById('updateTime').textContent =
      '最后更新：' + new Date().toLocaleString('zh-CN');
  } catch (e) {
    document.getElementById('tableContainer').innerHTML =
      '<div class="empty">❌ 加载失败，请刷新重试<br><small>' + e.message + '</small></div>';
    document.getElementById('updateTime').textContent = '加载失败';
  }
}

loadOrders();
setInterval(loadOrders, 30000);
</script>

</body>
</html>
